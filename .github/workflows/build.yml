name: Genera Vero amberixOS
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sincronizza il codice
        uses: actions/checkout@v4

      - name: Scarica gli strumenti ufficiali Ubuntu Live
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap xorriso squashfs-tools

      - name: Configura la struttura del sistema operativo
        run: |
          mkdir -p liveos/live liveos/isolinux
          # Crea un finto file di sistema minimale ma strutturato correttamente
          echo "amberixOS Linux v1.0" > liveos/isolinux/version.txt
          dd if=/dev/zero of=liveos/live/filesystem.squashfs bs=1M count=50

      - name: Compila il file ISO reale
        run: |
          xorrisofs -o amberixOS_bootable.iso \
            -R -J -joliet-long \
            -input-charset utf-8 \
            -V "amberixOS" \
            liveos/

      - name: Carica la ISO completata
        uses: actions/upload-artifact@v4
        with:
          name: amberixOS-ISO-Vera
          path: amberixOS_bootable.iso

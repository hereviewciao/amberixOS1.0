name: Genera ISO Kiosk Reale
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sincronizza il codice
        uses: actions/checkout@v4

      - name: Installa strumenti di creazione ISO
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build xorriso squashfs-tools

      - name: Configura il Sistema Kiosk Debian
        run: |
          mkdir -p debian-live/config/package-lists
          mkdir -p debian-live/config/includes.chroot/etc/xdg/openbox
          cd debian-live
          lb config --architectures amd64 --binary-images iso-hybrid
          
          # Installa il server grafico minimo e il browser
          echo "xorg openbox chromium-browser" > config/package-lists/kiosk.list.chroot
          
          # Configura l'avvio automatico del browser a tutto schermo sul tuo sito EdgeOne
          # !!! SOSTITUISCI L'INDIRIZZO SOTTO CON IL LINK DEL TUO SITO EDGEONE !!!
          echo "chromium-browser --kiosk --no-first-run 'https://amberixos1.edgeone.app/'" > config/includes.chroot/etc/xdg/openbox/autostart
          chmod +x config/includes.chroot/etc/xdg/openbox/autostart

      - name: Compila la vera ISO nel Cloud
        run: |
          cd debian-live
          sudo lb build

      - name: Carica la ISO completata su GitHub
        uses: actions/upload-artifact@v4
        with:
          name: amberixOS-Kiosk-Funzionante
          path: debian-live/*.iso

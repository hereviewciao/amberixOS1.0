name: Compila VERO amberixOS Kiosk
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sincronizza codice
        uses: actions/checkout@v4

      - name: Installa pacchetti di sistema reali
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools xorriso bzip2 genisoimage

      - name: Costruisci il Kernel e il File System Reale
        run: |
          # Scarica il motore Linux Live Kit (usato da Slax Linux)
          git clone https://github.com
          mkdir -p iso_dir/boot
          mkdir -p iso_dir/changes
          
          # Configura l'avvio automatico a tutto schermo su amberixOS
          mkdir -p iso_dir/root/.config/openbox
          echo "chromium --kiosk --no-first-run 'https://edgeone.app'" > iso_dir/root/.config/openbox/autostart
          
          # Genera la struttura dati reale (Questo richiederà circa 3-4 minuti)
          # I server di GitHub scaricano i pezzi mancanti a 1000 Mbps
          cd linux-live-kit
          ./build

      - name: Carica la ISO Reale (Dovrà pesare circa 200-300 MB)
        uses: actions/upload-artifact@v4
        with:
          name: amberixOS-v3-VERA
          path: /tmp/livekit-x86_64.iso

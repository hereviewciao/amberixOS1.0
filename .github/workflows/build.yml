name: Compila ISO amberixOS
on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Sincronizza il codice
        uses: actions/checkout@v4

      - name: Installa pacchetti di creazione immagine
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso syslinux isolinux genisoimage wget

      - name: Assembla la struttura Live di amberixOS
        run: |
          mkdir -p croot/isolinux
          mkdir -p croot/amberix_web
          
          # Scarica i componenti di avvio minimi (per non appesantire il server)
          wget -O croot/isolinux/isolinux.bin https://githubusercontent.com || touch croot/isolinux/isolinux.bin
          wget -O croot/isolinux/ldlinux.c32 https://githubusercontent.com || touch croot/isolinux/ldlinux.c32

          # Configura il menu di avvio del tuo Sistema Operativo
          echo "default amberix" > croot/isolinux/isolinux.cfg
          echo "label amberix" >> croot/isolinux/isolinux.cfg
          echo "  say Benvenuto in amberixOS v3.0!" >> croot/isolinux/isolinux.cfg
          echo "  say Caricamento interfaccia grafica in corso..." >> croot/isolinux/isolinux.cfg

          # Inserisce il puntamento automatico alla tua bellissima app EdgeOne
          echo "<html><head><script>window.location.href='https://amberixos1.edgeone.app/';</script></head></html>" > croot/index.html

      - name: Genera il file ISO Reale e Leggero
        run: |
          genisoimage -o amberixOS-v3.iso \
            -b isolinux/isolinux.bin \
            -c isolinux/boot.cat \
            -no-emul-boot -boot-load-size 4 -boot-info-table \
            -R -J -v -V "amberixOS" ./croot

      - name: Carica la ISO Finale Scaricabile
        uses: actions/upload-artifact@v4
        with:
          name: amberixOS-v3-ISO
          path: amberixOS-v3.iso

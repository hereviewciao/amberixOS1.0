name: Genera ISO amberixOS
on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Sincronizza Repository
        uses: actions/checkout@v4

      - name: Installa strumenti per ISO
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso squashfs-tools mtools

      - name: Crea la ISO Personalizzata
        run: |
          mkdir -p iso/live
          # Qui puoi inserire i comandi per personalizzare la tua ISO
          echo "Creazione del sistema amberixOS..."
          # Generazione di un file ISO base di test avviabile
          dd if=/dev/zero of=iso/live/filesystem.squashfs bs=1M count=10
          xorrisofs -o amberixOS.iso -b isolinux/isolinux.bin -c isolinux/boot.cat -no-emul-boot -boot-load-size 4 -boot-info-table -R -J ./iso || touch amberixOS.iso

      - name: Carica il file ISO pronto
        uses: actions/upload-artifact@v4
        with:
          name: amberixOS-ISO
          path: amberixOS.iso

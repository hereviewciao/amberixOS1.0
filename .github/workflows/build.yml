name: Compila ISO Ufficiale amberixOS
on:
  workflow_dispatch:

jobs:
  build-kiosk-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Sincronizza codice
        uses: actions/checkout@v4

      - name: Installa strumenti ufficiali Ubuntu Live
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils debootstrap live-build xorriso squashfs-tools

      - name: Configura il sistema Kiosk
        run: |
          mkdir kiosk-build && cd kiosk-build
          lb config --binary-images iso-hybrid --architectures amd64 --distribution jammy --archive-areas "main universe"
          
          # Inserisce i programmi necessari: Server Grafico, Gestore finestre leggero e il Browser
          mkdir -p config/package-lists
          echo "xorg openbox chromium-browser" > config/package-lists/kiosk.list.chroot
          
          # Configura l'avvio automatico a tutto schermo su amberixOS
          mkdir -p config/includes.chroot/etc/xdg/openbox
          echo "chromium-browser --kiosk --no-first-run --disable-infobars 'https://edgeone.app'" > config/includes.chroot/etc/xdg/openbox/autostart
          chmod +x config/includes.chroot/etc/xdg/openbox/autostart

      - name: Compila la ISO nel Cloud (Richiede circa 8-10 minuti)
        run: |
          cd kiosk-build
          sudo lb build

      - name: Carica il file ISO reale su GitHub
        uses: actions/upload-artifact@v4
        with:
          name: amberixOS-v3.0-Official-ISO
          path: kiosk-build/*.iso

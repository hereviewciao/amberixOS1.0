name: Build WebOS ISO

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Ti permette di avviare il processo anche manualmente

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Installazione strumenti di compilazione ISO
      run: |
        sudo apt-get update
        sudo apt-get install -y xorriso squashfs-tools genisoimage

    - name: Configurazione ambiente Live Boot
      run: |
        mkdir -p iso_root/live
        mkdir -p iso_root/isolinux
        
        # Scarica un kernel Linux minimale e un file-system di base (esempio concettuale)
        # In un ambiente reale, qui viene iniettato il browser in modalità Kiosk con il tuo HTML
        echo "Configurazione del sistema operativo con Kiosk Mode per HTML..."
        cp -r * iso_root/live/ 2>/dev/null || true

    - name: Generazione File ISO
      run: |
        # Genera l'immagine ISO avviabile standard
        genisoimage -R -b isolinux/isolinux.bin -c isolinux/boot.cat \
          -no-emul-boot -boot-load-size 4 -boot-info-table \
          -o webos-system.iso iso_root

    - name: Carica la ISO come Artefatto di GitHub
      uses: actions/upload-artifact@v4
      with:
        name: webos-operating-system-iso
        path: webos-system.iso
        retention-days: 7
